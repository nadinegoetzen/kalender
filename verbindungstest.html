<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supabase-Verbindungstest · Adventskalender</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Montserrat,Arial,sans-serif;background:#0e3b2e;color:#242424;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:26px;box-shadow:0 18px 50px rgba(0,0,0,.4)}
  h1{font-size:20px;margin:0 0 4px}
  p.sub{font-size:13px;color:#777;margin:0 0 18px}
  label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px}
  input{width:100%;padding:13px 14px;border:2px solid #e3e3e3;border-radius:11px;font-size:16px;outline:none;font-family:inherit}
  input:focus{border-color:#c42026}
  button{width:100%;margin-top:14px;padding:14px;border:none;border-radius:11px;background:#c42026;color:#fff;
    font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.5;cursor:default}
  .status{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13.5px;line-height:1.45;display:none}
  .ok{background:#e0f0e9;color:#0a855c;display:block}
  .err{background:#fdecea;color:#c42026;display:block}
  .info{background:#eef4f8;color:#2a6478;display:block}
  .step{display:none}.step.active{display:block}
</style>
</head>
<body>
  <div class="card">
    <h1>🔌 Supabase-Verbindungstest</h1>
    <p class="sub">Prüft Login (Magic-Link + Code) gegen deine Datenbank und den Mailjet-Versand.</p>

    <div id="step-email" class="step active">
      <label for="email">Deine E-Mail</label>
      <input id="email" type="email" placeholder="deine@email.de" autocomplete="email">
      <button id="btnSend">Code &amp; Link anfordern →</button>
    </div>

    <div id="step-code" class="step">
      <label for="code">6-stelligen Code aus der E-Mail</label>
      <input id="code" inputmode="numeric" maxlength="6" placeholder="••••••" style="text-align:center;letter-spacing:.4em;font-weight:800">
      <button id="btnVerify">Code bestätigen →</button>
    </div>

    <div id="status" class="status"></div>
  </div>

<script type="module">
import { registerOrLogin, verifyCode, currentUser, SUPABASE_URL }
  from "./supabase-client.js";

const $ = (id) => document.getElementById(id);
const status = $("status");
function show(kind, msg){ status.className = "status " + kind; status.innerHTML = msg; }

$("btnSend").onclick = async () => {
  const email = $("email").value.trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ show("err","Bitte gültige E-Mail eingeben."); return; }
  show("info","Sende Anfrage an Supabase (" + SUPABASE_URL + ") …");
  const { error } = await registerOrLogin(email, { newsletter:true, isNew:true });
  if(error){ show("err","❌ Fehler: " + error.message); return; }
  show("ok","✅ Verbindung steht! Wir haben dir Magic-Link + Code geschickt. Prüfe dein Postfach (und Spam).");
  $("step-email").classList.remove("active");
  $("step-code").classList.add("active");
};

$("btnVerify").onclick = async () => {
  const email = $("email").value.trim();
  const token = $("code").value.trim();
  if(token.length !== 6){ show("err","Bitte den 6-stelligen Code eingeben."); return; }
  show("info","Prüfe Code …");
  const { error } = await verifyCode(email, token);
  if(error){ show("err","❌ Code ungültig: " + error.message); return; }
  const user = await currentUser();
  show("ok","🎉 Eingeloggt! Alles funktioniert.<br>Nutzer-ID: " + (user?.id || "?") + "<br>E-Mail: " + (user?.email || "?"));
};
</script>
</body>
</html>
